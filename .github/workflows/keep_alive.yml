name: Keep App Alive

on:
  schedule:
    # Ejecutar cada 25 minutos todos los días
    # Nota: GitHub Actions usa cron en UTC (UTC-5 = hora Peru)
    - cron: '*/25 * * * *'
  workflow_dispatch:   # Permite ejecutar manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping Streamlit app (HTTP)
        run: |
          echo "Haciendo ping a la app DIRESA Huancavelica..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            --retry 2 \
            "https://dashboard-diresa-hvca.streamlit.app/")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "App respondio correctamente."
          else
            echo "Advertencia: la app respondio con status $STATUS"
          fi
